<!DOCTYPE html>

<html>
<head>
    <title>AI Crime Analysis & Prediction System</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#0f172a,#1e293b);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    .card{
        width:500px;
        border-radius:20px;
        box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .title{
        text-align:center;
        font-weight:bold;
        margin-bottom:20px;
    }

    .prediction{
        text-align:center;
        font-size:28px;
        font-weight:bold;
        color:#198754;
        margin-top:20px;
    }
</style>
```

</head>

<body>

<div class="card p-4">

```
<h2 class="title">
    🚔 AI Crime Analysis & Prediction System
</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">District</label>
        <input type="number" class="form-control" name="district" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Month</label>
        <input type="number" class="form-control" name="month" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Hour</label>
        <input type="number" class="form-control" name="hour" required>
    </div>

    <div class="d-grid">
        <button class="btn btn-primary btn-lg">
            Predict Crime
        </button>
    </div>

</form>

{% if prediction %}
<div class="prediction">
    Prediction: {{ prediction }}
</div>
{% endif %}
```

</div>

</body>
</html>
